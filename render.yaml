services:
  - type: web
    name: loan-advisor-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////data/loan_advisor.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
